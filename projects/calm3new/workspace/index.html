<!DOCTYPE html>
<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALM Module 3 Interactive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=Lora:italic,wght@0,400;0,700;1,400&amp;display=swap" rel="stylesheet">
    

    <link rel="stylesheet" href="./styles.css">
</head>
<body class="bg-slate-50 text-slate-900">
    <div class="flex flex-col md:flex-row min-h-screen">
        <!-- Sidebar -->
        <nav id="sidebar" class="w-full md:w-80 bg-white border-r border-slate-200 p-4 md:p-6 flex flex-col gap-4 md:sticky md:top-0 md:h-screen overflow-y-auto shadow-sm z-50 transition-all duration-300">
            <div class="mb-6">
                <div class="flex items-start justify-between gap-3">
                    <div>
                        <h1 id="sidebar-title" class="text-2xl font-bold text-indigo-700 leading-tight">CALM Module 3</h1>
                        <p id="sidebar-subtitle" class="text-xs text-slate-400 font-bold uppercase tracking-widest mt-1">Career and Life Choices</p>
                    </div>
                    <button id="sidebar-toggle" type="button" class="sidebar-toggle p-2 rounded-xl border border-slate-200 text-slate-500 hover:text-indigo-600 hover:border-indigo-200 transition-all" aria-label="Collapse menu" title="Collapse menu">
                        <i data-lucide="panel-left-close" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
            
            <div id="nav-links" class="flex flex-col gap-1.5">
                <!-- Nav items generated by JS -->
            </div>

            <div id="progress-wrap" class="mt-auto pt-6 border-t border-slate-100">
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Module Progress</p>
                    <div class="h-2 w-full bg-slate-200 rounded-full overflow-hidden">
                        <div id="progress-bar" class="h-full bg-indigo-600 transition-all duration-700 ease-out" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="flex-1 p-4 md:p-12 overflow-x-hidden relative">
            <div id="content-area" class="max-w-4xl mx-auto pb-24">
                <!-- Section content injected here -->
            </div>
            
            <!-- Footer Nav -->
            <div id="footer-nav" class="max-w-4xl mx-auto mt-16 pt-8 border-t border-slate-200 flex justify-between items-center pb-12">
                <button id="prev-btn" class="flex items-center gap-2 px-4 py-2 text-slate-400 hover:text-indigo-600 disabled:opacity-30 transition-all font-bold text-sm uppercase tracking-wider">
                    <i data-lucide="chevron-left" class="w-5 h-5"></i> Back
                </button>
                <button id="next-btn" class="flex items-center gap-2 px-8 py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-xl hover:bg-indigo-700 hover:-translate-y-0.5 active:translate-y-0 transition-all uppercase tracking-widest text-xs">
                    Mark Done &amp; Continue <i data-lucide="chevron-right" class="w-4 h-4"></i>
                </button>
            </div>
        </main>
    </div>

    


    <script src="./main.js"></script>
</body></html>
